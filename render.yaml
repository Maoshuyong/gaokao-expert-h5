services:
  - type: web
    name: gaokao-agent
    runtime: docker
    plan: free
    repo: https://github.com/Maoshuyong/gaokao-agent
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        value: "sqlite:///./data/gaokao.db"
      - key: LLM_BACKEND
        value: "https://api.siliconflow.cn/v1"
      - key: LLM_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: "deepseek-ai/DeepSeek-V3"
