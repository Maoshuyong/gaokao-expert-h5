services:
  - type: web
    name: gaokao-agent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "sqlite:///./data/gaokao.db"
